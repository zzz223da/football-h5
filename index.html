<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>122 足球预测 · 专业版</title>
    <style>
        :root { --bg: #f5f7fa; --card-bg: #ffffff; --text-primary: #1e293b; --text-secondary: #64748b; --border: #eef2f6; --header-bg: #ffffff; --accent: #3b82f6; --success: #059669; --warning: #d97706; --danger: #dc2626; }
        .dark { --bg: #0f172a; --card-bg: #1e293b; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border: #334155; --header-bg: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
        .app { max-width: 450px; margin: 0 auto; width: 100%; height: 100vh; display: flex; flex-direction: column; background: var(--bg); box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--header-bg); }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header-actions { display: flex; gap: 16px; }
        .header-actions span { font-size: 22px; cursor: pointer; }
        .page { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .page.active { display: block; }
        .tab-bar { display: flex; justify-content: space-around; padding: 8px 12px; border-top: 1px solid var(--border); background: var(--header-bg); }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary); font-size: 12px; cursor: pointer; }
        .tab-item.active { color: var(--accent); }
        .tab-item .icon { font-size: 22px; }
        .hero-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 20px; padding: 20px; color: #fff; margin-bottom: 20px; }
        .hero-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .hero-stats { display: flex; gap: 20px; margin-top: 12px; }
        .hero-stat .value { font-size: 28px; font-weight: 700; }
        .hero-stat .label { font-size: 12px; opacity: 0.8; }
        .section-title { font-size: 18px; font-weight: 600; margin: 20px 0 12px; display: flex; align-items: center; }
        .section-title span { width: 6px; height: 20px; background: var(--accent); border-radius: 6px; margin-right: 10px; }
        .quick-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
        .quick-item { background: var(--card-bg); border-radius: 16px; padding: 16px; text-align: center; border: 1px solid var(--border); cursor: pointer; }
        .quick-item .emoji { font-size: 28px; margin-bottom: 6px; }
        .search-box { margin-bottom: 16px; position: relative; }
        .search-box input { width: 100%; padding: 12px 16px 12px 40px; border: 1px solid var(--border); border-radius: 30px; font-size: 15px; background: var(--card-bg); color: var(--text-primary); outline: none; }
        .search-box .search-icon { position: absolute; left: 14px; top: 12px; color: var(--text-secondary); }
        .league-group { margin-bottom: 20px; border-radius: 18px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border); }
        .league-header { padding: 14px 16px; background: var(--card-bg); display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid var(--border); }
        .league-header.collapsed .arrow { transform: rotate(-90deg); }
        .league-matches.collapsed { display: none; }
        .match-card { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .match-teams { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
        .match-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 12px; }
        .quick-probs { display: flex; gap: 16px; margin-top: 6px; }
        .quick-prob { text-align: center; }
        .quick-prob .label { font-size: 11px; color: var(--text-secondary); }
        .quick-prob .value { font-size: 16px; font-weight: 700; }
        .home { color: var(--success); } .draw { color: var(--warning); } .away { color: var(--danger); }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 450px; margin: 0 auto; border-radius: 28px 28px 0 0; padding: 24px 20px; max-height: 80vh; overflow-y: auto; animation: slideUp 0.3s; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { font-size: 28px; color: var(--text-secondary); cursor: pointer; }
        .detail-section { margin-top: 16px; }
        .detail-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; }
        .detail-title span { width: 4px; height: 16px; background: var(--accent); border-radius: 4px; margin-right: 8px; }
        .prob-compare { display: flex; justify-content: space-around; background: var(--bg); border-radius: 12px; padding: 12px; }
        .factor-item { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .factor-bar { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; }
        .factor-fill-positive { height: 100%; background: var(--success); border-radius: 4px; }
        .factor-fill-negative { height: 100%; background: var(--danger); border-radius: 4px; }
        .refresh-btn { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; border-radius: 25px; background: var(--accent); color: #fff; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 999; font-size: 24px; cursor: pointer; }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1 id="pageTitle">122 预测</h1>
        <div class="header-actions">
            <span id="darkModeToggle">🌙</span>
            <span id="shareAppBtn" onclick="shareApp()">📤</span>
        </div>
    </div>
    <div id="homePage" class="page active">
        <div class="hero-card">
            <div class="hero-title">⚽ 今日赛事</div>
            <div id="todaySummary">加载中...</div>
            <div class="hero-stats">
                <div class="hero-stat"><div class="value" id="matchCount">--</div><div class="label">场比赛</div></div>
                <div class="hero-stat"><div class="value" id="modelAcc">--</div><div class="label">模型准确率</div></div>
            </div>
        </div>
        <div class="section-title"><span></span>热门推荐</div>
        <div class="quick-grid">
            <div class="quick-item" onclick="switchTab('matches')"><div class="emoji">📋</div><div class="label">全部赛事</div></div>
            <div class="quick-item" onclick="switchTab('matches')"><div class="emoji">🔥</div><div class="label">高价值</div></div>
            <div class="quick-item" onclick="switchTab('profile')"><div class="emoji">📊</div><div class="label">准确率</div></div>
            <div class="quick-item" onclick="switchTab('profile')"><div class="emoji">👤</div><div class="label">我的</div></div>
        </div>
        <div class="section-title"><span></span>即将开始</div>
        <div id="upcomingMatches" class="loading">加载中...</div>
    </div>
    <div id="matchesPage" class="page">
        <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="搜索球队或联赛..." autocomplete="off"></div>
        <div id="matchesContainer" class="loading">加载中...</div>
    </div>
    <div id="profilePage" class="page">
        <div class="hero-card" style="background:#1e293b;"><div class="hero-title">📊 数据统计</div><div style="display:flex;justify-content:space-around;margin-top:16px;"><div><div style="font-size:28px;font-weight:700;" id="profileModelAcc">--</div><div>模型</div></div><div><div style="font-size:28px;font-weight:700;" id="profileMarketAcc">--</div><div>市场</div></div><div><div style="font-size:28px;font-weight:700;" id="profileFusionWeight">--</div><div>融合权重</div></div></div></div>
        <div class="section-title"><span></span>功能设置</div>
        <div class="league-group"><div class="league-header" onclick="subscribeNotify()"><h3>🔔 订阅推送</h3><span class="arrow">▶</span></div></div>
        <div class="league-group"><div class="league-header" onclick="showAbout()"><h3>ℹ️ 关于</h3><span class="arrow">▶</span></div></div>
        <div class="league-group"><div class="league-header" onclick="location.reload()"><h3>🔄 强制刷新</h3><span class="arrow">▶</span></div></div>
    </div>
    <div class="tab-bar">
        <div class="tab-item active" data-tab="home"><span class="icon">🏠</span><span>首页</span></div>
        <div class="tab-item" data-tab="matches"><span class="icon">⚽</span><span>赛事</span></div>
        <div class="tab-item" data-tab="profile"><span class="icon">👤</span><span>我的</span></div>
    </div>
</div>
<div class="modal" id="detailModal"><div class="modal-content"><div class="modal-header"><h3>比赛详情</h3><span class="close-btn" onclick="closeModal()">✕</span></div><div id="modalBody"></div></div></div>
<button class="refresh-btn" id="refreshBtn">🔄</button>
<script>
    const UPDATE_SECRET = '{{MySecret123!}}';
    let appData = null;
    let currentTab = 'home';
    let searchKeyword = '';

    // 深色模式
    const darkToggle = document.getElementById('darkModeToggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
        darkToggle.innerText = '☀️';
    }
    darkToggle.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        darkToggle.innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // 刷新数据
    document.getElementById('refreshBtn').addEventListener('click', async () => {
        if (!confirm('确定刷新数据？可能需要几秒钟。')) return;
        const btn = document.getElementById('refreshBtn');
        btn.style.opacity = '0.5';
        btn.disabled = true;
        btn.innerText = '⏳';
        try {
            const res = await fetch(`/api/update?token=${encodeURIComponent(UPDATE_SECRET)}`);
            const data = await res.json();
            if (data.success) { alert('数据更新成功！'); location.reload(true); }
            else { alert('更新失败：' + (data.error || '未知错误')); }
        } catch (err) { alert('请求失败：' + err.message); }
        finally { btn.style.opacity = '1'; btn.disabled = false; btn.innerText = '🔄'; }
    });

    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab-item[data-tab="${tabId}"]`).classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(tabId + 'Page').classList.add('active');
        document.getElementById('pageTitle').innerText = tabId === 'home' ? '122 预测' : (tabId === 'matches' ? '全部赛事' : '我的');
        currentTab = tabId;
        if (tabId === 'matches' && appData) renderMatchesPage();
        if (tabId === 'profile' && appData) renderProfilePage();
    };

    window.subscribeNotify = function() {
        const userId = prompt('请输入您的 Telegram 用户 ID（可从 @userinfobot 获取）');
        if (userId) {
            fetch('/api/subscribe', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId}) })
                .then(r => r.json()).then(d => alert(d.success ? '订阅成功！' : '订阅失败'));
        }
    };

    window.showAbout = () => alert('122 足球预测系统\n版本 3.0\n基于泊松模型+多因子融合');

    window.closeModal = () => document.getElementById('detailModal').classList.remove('active');

    window.shareApp = () => {
        if (navigator.share) {
            navigator.share({ title: '122足球预测', url: window.location.href });
        } else {
            prompt('复制链接分享', window.location.href);
        }
    };

    async function loadData() {
        try {
            const res = await fetch('data.json');
            appData = await res.json();
            renderHomePage();
            if (currentTab === 'matches') renderMatchesPage();
            if (currentTab === 'profile') renderProfilePage();
        } catch (e) {
            document.querySelectorAll('.loading').forEach(el => el.innerHTML = '<div>加载失败</div>');
        }
    }

    function renderHomePage() {
        if (!appData) return;
        const matches = appData.matches || [];
        document.getElementById('matchCount').innerText = matches.length;
        document.getElementById('todaySummary').innerText = `${appData.date} · ${matches.length} 场比赛`;
        document.getElementById('modelAcc').innerText = '53.2%';
        const upcoming = matches.slice(0, 3);
        let html = '';
        upcoming.forEach(m => {
            const probs = m.finalProbs || m.modelProbs || { home:0.33, draw:0.34, away:0.33 };
            html += `<div class="match-card" onclick="showDetail(${JSON.stringify(m).replace(/"/g,'&quot;')})"><div class="match-teams">${m.homeTeam} vs ${m.awayTeam}</div><div class="match-meta">${m.date.split(' ')[1]||''} · ${m.league}</div><div class="quick-probs"><div class="quick-prob"><span class="label">主</span><span class="value home">${(probs.home*100).toFixed(0)}%</span></div><div class="quick-prob"><span class="label">平</span><span class="value draw">${(probs.draw*100).toFixed(0)}%</span></div><div class="quick-prob"><span class="label">客</span><span class="value away">${(probs.away*100).toFixed(0)}%</span></div></div></div>`;
        });
        document.getElementById('upcomingMatches').innerHTML = html || '<div class="loading">暂无比赛</div>';
    }

    function renderMatchesPage() {
        if (!appData) return;
        let matches = appData.matches || [];
        if (searchKeyword) {
            matches = matches.filter(m => m.homeTeam.toLowerCase().includes(searchKeyword) || m.awayTeam.toLowerCase().includes(searchKeyword) || (m.league||'').toLowerCase().includes(searchKeyword));
        }
        if (matches.length === 0) { document.getElementById('matchesContainer').innerHTML = '<div class="loading">无匹配比赛</div>'; return; }
        const grouped = {};
        matches.forEach(m => { const l = m.league||'其他'; if(!grouped[l]) grouped[l]=[]; grouped[l].push(m); });
        let html = '';
        for (let l in grouped) {
            html += `<div class="league-group"><div class="league-header" onclick="toggleLeague(this)"><h3>${l}</h3><span class="badge">${grouped[l].length}</span><span class="arrow">▼</span></div><div class="league-matches">`;
            grouped[l].forEach(m => {
                const probs = m.finalProbs || m.modelProbs || { home:0.33, draw:0.34, away:0.33 };
                html += `<div class="match-card" onclick="showDetail(${JSON.stringify(m).replace(/"/g,'&quot;')})"><div class="match-teams">${m.homeTeam} vs ${m.awayTeam}</div><div class="match-meta">${m.date.split(' ')[1]||''} · ${m.league}</div><div class="quick-probs"><div class="quick-prob"><span class="label">主</span><span class="value home">${(probs.home*100).toFixed(0)}%</span></div><div class="quick-prob"><span class="label">平</span><span class="value draw">${(probs.draw*100).toFixed(0)}%</span></div><div class="quick-prob"><span class="label">客</span><span class="value away">${(probs.away*100).toFixed(0)}%</span></div></div>${m.isHighValue?'<div style="color:#f59e0b;font-size:12px;">🔥 高价值</div>':''}</div>`;
            });
            html += `</div></div>`;
        }
        document.getElementById('matchesContainer').innerHTML = html;
    }

    window.toggleLeague = function(el) {
        el.classList.toggle('collapsed');
        el.nextElementSibling.classList.toggle('collapsed');
    };

    function renderProfilePage() {
        document.getElementById('profileModelAcc').innerText = '53.2%';
        document.getElementById('profileMarketAcc').innerText = '51.8%';
        document.getElementById('profileFusionWeight').innerText = appData ? (appData.fusionWeight*100).toFixed(0)+'%' : '60%';
    }

    window.showDetail = function(m) {
        const probs = m.finalProbs || m.modelProbs || {};
        let html = `<div style="margin-bottom:20px;"><div style="font-size:22px;font-weight:700;">${m.homeTeam} vs ${m.awayTeam}</div><div style="color:var(--text-secondary);">${m.date} · ${m.league}</div></div>`;
        html += `<div class="detail-section"><div class="detail-title"><span></span>胜平负概率</div><div class="prob-compare"><div><div>主胜</div><div style="font-size:24px;font-weight:700;color:var(--success);">${(probs.home*100).toFixed(1)}%</div></div><div><div>平局</div><div style="font-size:24px;font-weight:700;color:var(--warning);">${(probs.draw*100).toFixed(1)}%</div></div><div><div>客胜</div><div style="font-size:24px;font-weight:700;color:var(--danger);">${(probs.away*100).toFixed(1)}%</div></div></div></div>`;
        html += `<div class="detail-section"><div class="detail-title"><span></span>比分倾向</div><div style="display:flex;gap:8px;"><span style="background:var(--bg);padding:6px 16px;border-radius:20px;">${m.bestScore||'--'}</span><span style="background:var(--bg);padding:6px 16px;border-radius:20px;">${m.secondScore||'--'}</span></div></div>`;
        if (m.isHighValue) html += `<div style="background:#fffbeb;border-left:4px solid #f59e0b;padding:12px;border-radius:8px;margin:16px 0;">🔥 高价值关注</div>`;
        if (m.factors) {
            html += `<div class="detail-section"><div class="detail-title"><span></span>关键因子</div>`;
            m.factors.forEach(f => {
                const isPos = f.value > 0, pct = Math.abs(f.value*100).toFixed(0);
                html += `<div class="factor-item"><span style="width:80px;">${f.name}</span><div class="factor-bar"><div class="${isPos?'factor-fill-positive':'factor-fill-negative'}" style="width:${pct}%"></div></div><span style="color:${isPos?'var(--success)':'var(--danger)'};">${isPos?'+'+pct:'-'+pct}%</span></div>`;
            });
            html += `</div>`;
        }
        if (m.h2h) {
            html += `<div class="detail-section"><div class="detail-title"><span></span>历史交锋</div><div style="display:flex;gap:8px;flex-wrap:wrap;">`;
            m.h2h.forEach(h => html += `<div style="background:var(--bg);padding:6px 12px;border-radius:12px;">${h.date}<br>${h.homeTeam} ${h.homeScore}-${h.awayScore} ${h.awayTeam}</div>`);
            html += `</div></div>`;
        }
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('detailModal').classList.add('active');
    };

    document.getElementById('searchInput').addEventListener('input', e => { searchKeyword = e.target.value.toLowerCase(); if (currentTab === 'matches') renderMatchesPage(); });
    document.querySelectorAll('.tab-item').forEach(i => i.addEventListener('click', () => switchTab(i.dataset.tab)));
    document.getElementById('detailModal').addEventListener('click', e => { if (e.target === document.getElementById('detailModal')) closeModal(); });
    loadData();
</script>
</body>
</html>
